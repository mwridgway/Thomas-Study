<!DOCTYPE html>
<html lang="en-ZA">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Preferences | Thomas's Study Hub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="back-link">&larr; Dashboard</a>
            <h1>&#9881;&#65039; Subject Preferences</h1>
            <p class="subtitle">Choose which subjects appear on your dashboard</p>
        </div>
    </header>

    <main>
        <section class="view active">
            <div class="preferences-container">
                <p class="prefs-intro">Toggle subjects on or off. Disabled subjects won't appear on the dashboard or in schedule filters. You can still access them directly via their URL.</p>
                <div class="subject-toggle-list" id="subject-toggle-list"></div>
                <div class="prefs-actions">
                    <button class="primary-btn" id="prefs-save">Save Preferences</button>
                    <button class="secondary-btn" id="prefs-enable-all">Enable All</button>
                </div>
                <div class="prefs-saved-msg hidden" id="prefs-saved-msg">&#10003; Preferences saved!</div>
            </div>
        </section>
    </main>

    <footer>
        <p>Thomas's Study Hub &mdash; Grade 12 NSC</p>
    </footer>

    <script src="js/subject-filter.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var subjects = SubjectFilter.getAllSubjects();
        var enabled = SubjectFilter.getEnabledSubjects();
        var list = document.getElementById("subject-toggle-list");

        subjects.forEach(function(subj) {
            var item = document.createElement("div");
            item.className = "subject-toggle-item";
            var checked = enabled.includes(subj.id) ? "checked" : "";
            item.innerHTML = '<label class="toggle-label"><input type="checkbox" value="' + subj.id + '" ' + checked + '><span class="toggle-switch"></span><span class="toggle-text">' + subj.label + '</span></label>';
            list.appendChild(item);
        });

        document.getElementById("prefs-save").addEventListener("click", function() {
            var checked = Array.from(list.querySelectorAll("input:checked")).map(function(cb) { return cb.value; });
            SubjectFilter.saveEnabledSubjects(checked);
            var msg = document.getElementById("prefs-saved-msg");
            msg.classList.remove("hidden");
            setTimeout(function() { msg.classList.add("hidden"); }, 2000);
        });

        document.getElementById("prefs-enable-all").addEventListener("click", function() {
            list.querySelectorAll("input").forEach(function(cb) { cb.checked = true; });
        });
    });
    </script>
</body>
</html>
